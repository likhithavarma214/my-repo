version: 0.2

env:
  variables:
    SOFT_FAIL: "true"
    IMAGE: "gitlab"
    IMAGE_TAG: "test"
    IMAGE_TAR: "image.tar"

phases:
  install:
    runtime-versions:
      python: 3.11   
    commands:
      - echo "Installing dependencies..."
      - yum install -y docker
      - service docker start

      - echo "Installing AccuKnox ASPM scanner..."
      - pip install https://github.com/accuknox/aspm-scanner-cli/releases/download/v0.14.2/accuknox_aspm_scanner-0.14.2-py3-none-any.whl --break-system-packages

  build:
    commands:
      - echo "Running AccuKnox container scan"

      - docker build -t $IMAGE:$IMAGE_TAG .
      - docker save -o $IMAGE_TAR $IMAGE:$IMAGE_TAG

      - if [ "$SOFT_FAIL" = "true" ]; then SOFT_FAIL_ARG="--softfail"; fi

      - CMD="image $IMAGE:$IMAGE_TAG"

      - echo "Executing scan..."
      - accuknox-aspm-scanner scan $SOFT_FAIL_ARG container --command "$CMD" --container-mode

artifacts:
  files:
    - '**/*'
    - image.tar
