version: 0.2

env:
  variables:
    SOFT_FAIL: "true"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - yum install -y libxcrypt-compat
      - pip install https://github.com/accuknox/aspm-scanner-cli/releases/download/v0.14.2/accuknox_aspm_scanner-0.14.2-py3-none-any.whl --break-system-packages

  build:
    commands:
      - echo "===== DEBUG FILES ====="
      - pwd
      - ls -R
      - echo "Running Secret Scan"
      - if [ "$SOFT_FAIL" = "true" ]; then SOFT_FAIL_ARG="--softfail"; fi
      - accuknox-aspm-scanner scan $SOFT_FAIL_ARG secret --path .
